services:
  gmail-2fa-bot:
    build: .
    env_file: .env
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - bot_data:/data
      # Uncomment and adjust the path to mount your GCP service account key:
      # - ./credentials.json:/app/credentials.json:ro
    restart: unless-stopped

volumes:
  bot_data:
